---
- name: "Playbook B: 事後判定機制驗證"
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    # 1. 強制冪等 (changed_when: false)
    # 用於那些「只是讀取資訊」的指令，不管跑幾次都該是 ok
    - name: "1. [changed_when: false] 永遠回報 ok"
      shell: "ls /tmp"
      changed_when: false

    # 2. 邏輯判定 (根據 stdout 內容)
    # 這是最靈活的，模擬執行一個指令後，分析文字來決定算不算「變動」
    - name: "2. [changed_when] 根據輸出文字判定變動"
      shell: |
        # 模擬一個指令，隨機決定要不要輸出 'All good'
        if [ ! -f /tmp/logic_test.flag ]; then
          echo "Initial setup required"
          touch /tmp/logic_test.flag
        else
          echo "System is already optimized. All good."
        fi
      register: shell_output
      # 關鍵：只有當輸出的文字「不包含」'All good' 時，才算 changed
      changed_when: "'All good' not in shell_output.stdout"

    # 3. 結合 failed_when (輔助機制)
    # 這不是為了冪等，但能確保當指令「不符合預期」時直接斷掉
    - name: "3. [failed_when] 跑完後檢查回傳碼"
      shell: "echo 'Checking system...'; exit 0"
      register: check_rc
      failed_when: "check_rc.rc != 0"