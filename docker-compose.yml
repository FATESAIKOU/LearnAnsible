services:
  control:
    build:
      context: ./control
    container_name: ansible-control
    tty: true
    volumes:
      - ./ansible:/work/ansible
    working_dir: /work/ansible
    networks:
      labnet:
        ipv4_address: 172.28.0.10

  t1:
    build:
      context: ./target
    container_name: ansible-t1
    hostname: t1
    networks:
      labnet:
        ipv4_address: 172.28.0.11

  t2:
    build:
      context: ./target
    container_name: ansible-t2
    hostname: t2
    networks:
      labnet:
        ipv4_address: 172.28.0.12

  t3:
    build:
      context: ./target
    container_name: ansible-t3
    hostname: t3
    networks:
      labnet:
        ipv4_address: 172.28.0.13

networks:
  labnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
